<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Créer ton lien anonyme</title>

<style>

body{

margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff0066,#ff7a00);
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.card{

background:white;
padding:40px;
border-radius:20px;
width:400px;
text-align:center;

}

input{

width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#eee;
margin-top:20px;

}

button{

margin-top:20px;
padding:15px;
border:none;
background:black;
color:white;
border-radius:30px;
width:100%;
cursor:pointer;

}

#result{

margin-top:20px;
word-break:break-all;

}

</style>

</head>

<body>

<div class="card">

<h2>Créer ton lien anonyme</h2>

<p>

Choisis un pseudo pour générer ton lien personnel.

</p>

<input id="username" placeholder="Ton pseudo">

<button onclick="createLink()">

Créer mon lien

</button>

<div id="result"></div>

</div>


<script>

function createLink(){

let username=document.getElementById("username").value;

let link=window.location.origin+"/anonymous/ask.html?u="+username;

document.getElementById("result").innerHTML=

`Ton lien :

<br><br>

<a href="${link}">${link}</a>

`;

}

</script>

</body>
</html>
