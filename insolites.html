<!-- FIREBASE + JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, onSnapshot, doc, updateDoc, increment, addDoc, query, where 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   🔥 FIREBASE CONFIG
========================= */
const firebaseConfig = {
  apiKey: "AIzaSyBdo7NO1PnAa90PhEhuzpllkB1ESGZu3J8",
  authDomain: "harry-undersand.firebaseapp.com",
  projectId: "harry-undersand",
  storageBucket: "harry-undersand.appspot.com",
  messagingSenderId: "1008823909561",
  appId: "1:1008823909561:web:9a8b4b46cab592972f6f68"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

/* =========================
   🎥 LOAD VIDEOS (TEMPS RÉEL)
========================= */
onSnapshot(collection(db, "videos"), (snap) => {
  grid.innerHTML = "";

  snap.forEach(docSnap => {
    const data = docSnap.data();
    const id = docSnap.id;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <video src="${data.url}" controls></video>
      <button onclick="like('${id}')">❤️ ${data.likes || 0}</button>

      <div class="comment-box">
        <input placeholder="Commenter..." id="c-${id}">
        <button onclick="sendComment('${id}')">Envoyer</button>
        <div id="comments-${id}"></div>
      </div>
    `;

    grid.appendChild(card);

    loadComments(id);
  });
});

/* =========================
   ❤️ LIKE
========================= */
window.like = async (id) => {
  await updateDoc(doc(db,"videos",id), {
    likes: increment(1)
  });
};

/* =========================
   💬 AJOUT COMMENTAIRE
========================= */
window.sendComment = async (id) => {
  const input = document.getElementById("c-"+id);

  if(!input.value) return;

  await addDoc(collection(db,"comments"), {
    videoId: id,
    text: input.value,
    date: Date.now()
  });

  input.value = "";
};

/* =========================
   🔄 LOAD COMMENTS OPTIMISÉ
========================= */
function loadComments(videoId){

  const q = query(
    collection(db,"comments"),
    where("videoId","==",videoId)
  );

  onSnapshot(q, (snap)=>{
    const box = document.getElementById("comments-"+videoId);
    box.innerHTML = "";

    snap.forEach(doc=>{
      const c = doc.data();

      const div = document.createElement("div");
      div.className = "comment";
      div.textContent = "💬 " + c.text;

      box.appendChild(div);
    });
  });
}

</script>

<script>
let dark = true;

function toggleMode(){
  dark = !dark;

  document.body.style.background = dark ? "#0a0a0a" : "white";
  document.body.style.color = dark ? "white" : "black";
}
</script>
