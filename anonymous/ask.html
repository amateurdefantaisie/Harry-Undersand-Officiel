</html><!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Envoyer message anonyme</title>

<style>

body{

margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff0066,#ff7a00);
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.card{

background:white;
padding:40px;
border-radius:20px;
width:400px;
text-align:center;

}

textarea{

width:100%;
height:120px;
border:none;
background:#eee;
border-radius:10px;
padding:10px;

}

button{

margin-top:20px;
padding:15px;
border:none;
background:black;
color:white;
border-radius:30px;
width:100%;
cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h2 id="username">@user</h2>

<p>Envoie un message anonyme</p>

<textarea id="message"></textarea>

<button onclick="sendMessage()">

Envoyer

</button>

</div>

<script>

const firebaseURL="https://TONFIREBASE.firebaseio.com/messages.json";

let params=new URLSearchParams(window.location.search);

let user=params.get("u");

document.getElementById("username").innerText="@"+user;


function sendMessage(){

let message=document.getElementById("message").value;

fetch(firebaseURL,{

method:"POST",

body:JSON.stringify({

user:user,

message:message,

time:Date.now()

})

})

.then(()=>{

alert("Message envoyé !")

window.location.href="create.html"

})

}

</script>

</body>
</html>
