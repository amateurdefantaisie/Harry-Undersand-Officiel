<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Insolites Moments</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: Poppins;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

:root {
    --bg: #0a0a0a;
    --text: #fff;
}

.light {
    --bg: #fff;
    --text: #000;
}

/* SWITCH */
.switch {
    position: fixed;
    top: 20px;
    right: 20px;
    cursor: pointer;
    z-index: 1000;
}

/* TIKTOK STYLE */
.feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.video-container {
    height: 100vh;
    scroll-snap-align: start;
    position: relative;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ACTIONS */
.actions {
    position: absolute;
    right: 10px;
    bottom: 100px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.actions button {
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}

/* COMMENTAIRES */
.comments {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    max-height: 200px;
    overflow-y: auto;
    padding: 10px;
}

input {
    width: 100%;
    padding: 10px;
    border: none;
}

/* UPLOAD */
.upload {
    position: fixed;
    bottom: 20px;
    left: 20px;
}
</style>

</head>
<body>

<button class="switch" onclick="toggleMode()">🌙</button>

<div class="upload">
    <input type="file" id="uploadVideo">
    <button onclick="upload()">Publier</button>
</div>

<div class="feed" id="feed"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBdo7NO1PnAa90PhEhuzpllkB1ESGZu3J8",
  authDomain: "harry-undersand.firebaseapp.com",
  projectId: "harry-undersand",
  storageBucket: "harry-undersand.appspot.com"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

/* MODE SOMBRE */
function toggleMode(){
    document.body.classList.toggle("light");
}

/* UPLOAD VIDEO */
async function upload(){
    const file = document.getElementById("uploadVideo").files[0];
    if(!file) return alert("Choisis une vidéo");

    const ref = storage.ref("videos/" + file.name);
    await ref.put(file);

    const url = await ref.getDownloadURL();

    await db.collection("videos").add({
        url: url,
        likes: 0,
        created: Date.now()
    });
}

/* LOAD VIDEOS */
db.collection("videos").orderBy("created","desc")
.onSnapshot(snap => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snap.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "video-container";

        div.innerHTML = `
        <video src="${data.url}" autoplay loop muted></video>

        <div class="actions">
            <button onclick="like('${doc.id}')">❤️ ${data.likes || 0}</button>
        </div>

        <div class="comments" id="c-${doc.id}">
            <div></div>
            <input placeholder="Commenter..." 
            onkeydown="addComment(event,'${doc.id}')">
        </div>
        `;

        feed.appendChild(div);

        loadComments(doc.id);
    });
});

/* LIKE */
function like(id){
    const ref = db.collection("videos").doc(id);
    ref.update({
        likes: firebase.firestore.FieldValue.increment(1)
    });
}

/* COMMENTAIRES */
function addComment(e, id){
    if(e.key === "Enter"){
        db.collection("videos")
        .doc(id)
        .collection("comments")
        .add({
            text: e.target.value
        });
        e.target.value = "";
    }
}

function loadComments(id){
    db.collection("videos")
    .doc(id)
    .collection("comments")
    .onSnapshot(snap => {
        const box = document.getElementById("c-"+id);
        let html = "";

        snap.forEach(c => {
            html += `<p>${c.data().text}</p>`;
        });

        box.children[0].innerHTML = html;
    });
}
</script>

</body>
</html>
