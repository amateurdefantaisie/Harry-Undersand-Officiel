<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Dashboard</title>

<style>

body{

font-family:Arial;
background:#111;
color:white;
padding:40px;

}

.message{

background:#222;
padding:20px;
border-radius:10px;
margin-bottom:20px;

}

</style>

</head>

<body>

<h1>Messages reçus</h1>

<div id="messages"></div>


<script>

const url="https://TONFIREBASE.firebaseio.com/messages.json"

fetch(url)

.then(res=>res.json())

.then(data=>{

for(let id in data){

let msg=data[id]

document.getElementById("messages").innerHTML+=`

<div class="message">

${msg.message}

</div>

`

}

})

</script>

</body>
</html>
