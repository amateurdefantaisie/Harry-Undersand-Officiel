<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer ton lien</title>

<link rel="stylesheet" href="style.css">

<style>

body{

background: linear-gradient(135deg,#ff0066,#ff7a00);

font-family: Arial;

margin:0;

color:white;

}

.hero{

text-align:center;

padding:120px 20px;

}

.btn-main{

background:black;

padding:15px 40px;

border-radius:30px;

color:white;

text-decoration:none;

}

.card{

background:white;

color:black;

width:400px;

padding:30px;

margin:auto;

border-radius:20px;

text-align:center;

margin-top:100px;

}

textarea{

width:100%;

height:120px;

border-radius:10px;

padding:10px;

}

button{

background:black;

color:white;

border:none;

padding:15px;

border-radius:30px;

margin-top:10px;

cursor:pointer;

}

.feature{

margin:40px;

}
</style>

</head>

<body>

<div class="card">

<h2>Créer ton lien anonyme</h2>

<p>

Choisis un pseudo unique. Ce pseudo sera utilisé pour générer ton lien personnel que tu pourras partager sur internet.

Exemple :

https://tonsite.com/anonymous/ask.html?user=tonpseudo

</p>

<input id="username" placeholder="Ton pseudo">

<button onclick="createLink()">
Créer mon lien
</button>

<p id="result"></p>

</div>

<script src="app.js"></script>
