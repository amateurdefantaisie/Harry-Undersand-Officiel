<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard Client</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Inter;
background:#0a0a0f;
color:white;
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#111118;
border-right:1px solid rgba(139,92,246,.25);
padding:30px 20px;
}

.logo{
color:#8b5cf6;
font-weight:800;
font-size:1.2rem;
margin-bottom:40px;
display:block;
text-decoration:none;
}

.menu a{
display:block;
color:#b4b4b4;
text-decoration:none;
padding:12px;
border-radius:10px;
margin-bottom:6px;
transition:.2s;
}

.menu a:hover{
background:#1b1b2f;
color:white;
}

/* MAIN */

.main{
flex:1;
padding:40px;
max-width:1200px;
margin:auto;
}

.title{
font-size:2rem;
margin-bottom:10px;
}

.subtitle{
color:#9ca3af;
margin-bottom:30px;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat{
background:#141421;
border:1px solid rgba(139,92,246,.3);
padding:20px;
border-radius:16px;
}

/* CARDS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:24px;
}

.card{
background:linear-gradient(145deg,#141421,#1b1b2f);
border:1px solid rgba(139,92,246,.3);
border-radius:18px;
padding:24px;
}

.card i{
font-size:2rem;
color:#8b5cf6;
}

.orders{
margin-top:10px;
font-size:.9rem;
}

.notification{
padding:8px;
border-bottom:1px solid #222;
font-size:.9rem;
}

.badge{
background:red;
color:white;
font-size:.7rem;
padding:3px 6px;
border-radius:50%;
margin-left:6px;
}

.user{
display:flex;
align-items:center;
gap:10px;
margin-bottom:30px;
}

.user img{
width:50px;
height:50px;
border-radius:50%;
}

</style>
</head>

<body>

<div class="sidebar">

<a class="logo">Amateur De Fantaisie</a>

<div class="menu">

<a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
<a href="commande.html"><i class="fas fa-box"></i> Commandes</a>
<a href="streaming.html"><i class="fas fa-tv"></i> Streaming</a>
<a href="chatbot.html"><i class="fas fa-robot"></i> Chatbots</a>
<a href="contact.html"><i class="fas fa-headset"></i> Support</a>
<a id="logoutBtn"><i class="fas fa-sign-out"></i> Déconnexion</a>

</div>

</div>

<div class="main">

<div class="user" id="user-profile" style="display:none">

<img id="userPhoto">
<div>
<strong id="userName"></strong>
<div style="font-size:.8rem;color:#9ca3af" id="userEmail"></div>
</div>

</div>

<h1 class="title">📊 Tableau de bord</h1>
<p class="subtitle">Gérez vos services et abonnements</p>

<div class="stats">

<div class="stat">
<i class="fas fa-box"></i>
<h3 id="statOrders">0</h3>
<p>Commandes</p>
</div>

<div class="stat">
<i class="fas fa-bell"></i>
<h3>
Notifications
<span id="notifCount" class="badge">0</span>
</h3>
</div>

</div>

<div class="grid">

<div class="card">
<i class="fas fa-box"></i>
<h3>Mes commandes</h3>
<div id="orders" class="orders">Chargement...</div>
</div>

<div class="card">
<i class="fas fa-bell"></i>
<h3>Notifications</h3>
<div id="notifications"></div>
</div>

<div class="card">
<i class="fas fa-tv"></i>
<h3>Streaming</h3>
<p>Netflix, Prime Video, Crunchyroll</p>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
onSnapshot,
orderBy
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyBdo7NO1PnAa90PhEhuzpllkB1ESGZu3J8",
authDomain:"harry-undersand.firebaseapp.com",
projectId:"harry-undersand"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let currentUser=null;

const profile=document.getElementById("user-profile");

onAuthStateChanged(auth,user=>{

if(!user){
window.location="/";
return;
}

currentUser=user;

profile.style.display="flex";

userPhoto.src=user.photoURL || "https://i.imgur.com/6VBx3io.png";
userName.textContent=user.displayName || "Client";
userEmail.textContent=user.email;

loadOrders();
listenNotifications();

});

async function loadOrders(){

const q=query(
collection(db,"orders"),
where("userId","==",currentUser.uid)
);

const snapshot=await getDocs(q);

let html="";

snapshot.forEach(doc=>{

const o=doc.data();

html+=`
<div class="notification">
📦 ${o.service} — ${o.status}
</div>
`;

});

if(snapshot.empty){
html="Aucune commande";
}

document.getElementById("orders").innerHTML=html;
document.getElementById("statOrders").textContent=snapshot.size;

}

function listenNotifications(){

const q=query(
collection(db,"notifications"),
where("userId","==",currentUser.uid),
orderBy("date","desc")
);

onSnapshot(q,(snapshot)=>{

let html="";
let count=0;

snapshot.forEach(doc=>{

const n=doc.data();

html+=`
<div class="notification">
🔔 ${n.message}
</div>
`;

count++;

});

if(snapshot.empty){
html="Aucune notification";
}

document.getElementById("notifications").innerHTML=html;
document.getElementById("notifCount").textContent=count;

});

}

logoutBtn.onclick=async()=>{
await signOut(auth)
window.location="/"
}

</script>

</body>
</html>
