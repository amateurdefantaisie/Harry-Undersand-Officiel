<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Message anonyme</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff0066,#ff7a00);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:#333;
}

.card{

background:white;
width:420px;
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 30px 70px rgba(0,0,0,0.3);
animation:fade .6s;

}

h2{
margin-top:0;
}

textarea{

width:100%;
height:130px;
border:none;
background:#f2f2f2;
border-radius:15px;
padding:15px;
font-size:15px;

}

button{

margin-top:20px;
padding:15px;
border:none;
background:black;
color:white;
border-radius:30px;
width:100%;
cursor:pointer;
font-size:16px;
transition:.3s;

}

button:hover{
transform:scale(1.05);
}

.suggestions{

margin-top:15px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;

}

.suggestions span{

background:#eee;
padding:8px 14px;
border-radius:20px;
font-size:13px;
cursor:pointer;

}

.viral{

margin-top:15px;
font-size:14px;
color:#666;

}

.toast{

position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:15px 25px;
border-radius:30px;
opacity:0;
transition:.3s;

}

.toast.show{
opacity:1;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>


<body>

<div class="card">

<h2 id="username">@user</h2>

<p>Envoie un message anonyme</p>

<textarea id="message" maxlength="600"
placeholder="Écris ton message..."></textarea>

<div class="suggestions">

<span onclick="autoMsg(this)">Qui est ton crush ?</span>

<span onclick="autoMsg(this)">Note-moi sur 10</span>

<span onclick="autoMsg(this)">Quel est ton secret ?</span>

<span onclick="autoMsg(this)">Qui t'attire ?</span>

</div>

<button id="sendBtn" onclick="sendMessage()">
Envoyer anonymement
</button>

<div class="viral" id="viralCount">
Chargement...
</div>

</div>

<div class="toast" id="toast"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
import { getDatabase,ref,push,get,child } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js";


const firebaseConfig = {

apiKey:"AIzaSyBdo7NO1PnAa90PhEhuzpllkB1ESGZu3J8",
authDomain:"harry-undersand.firebaseapp.com",
projectId:"harry-undersand",
databaseURL:"https://harry-undersand-default-rtdb.firebaseio.com"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);


const randomQuestions = [

"Quel est ton plus grand secret ?",
"Qui est ton crush ?",
"Quelle est ta pire honte ?",
"Qui t'attire ?",
"Note-moi sur 10"

];


let params = new URLSearchParams(window.location.search);

let user = params.get("u");

if(!user){

document.querySelector(".card").innerHTML="<h2>Lien invalide</h2>";
throw new Error("Paramètre manquant");

}

document.getElementById("username").innerText="@"+user;



function showToast(msg){

let toast=document.getElementById("toast");

toast.innerText=msg;

toast.classList.add("show");

setTimeout(()=>{

toast.classList.remove("show")

},3000)

}


window.autoMsg=(el)=>{

document.getElementById("message").value=el.innerText

}


let lastMessageTime=0;


window.sendMessage=()=>{

let message=document.getElementById("message").value.trim();

let btn=document.getElementById("sendBtn");

let now=Date.now();


if(message.length<3){

showToast("Message trop court");

return;

}


if(now-lastMessageTime<5000){

showToast("Attends 5 secondes");

return;

}

lastMessageTime=now;


btn.disabled=true;

btn.innerText="Envoi...";


push(ref(db,"messages/"+user),{

message:message,
time:Date.now()

})

.then(()=>{

btn.innerText="Envoyé ✔";

showToast("Message envoyé ✔");


setTimeout(()=>{

window.location.href="/anonymous/create.html?sent=true"

},1500)

})

.catch((error)=>{

console.error(error);

showToast("Erreur d'envoi");

btn.disabled=false;

btn.innerText="Envoyer anonymement";

});

}



// question aléatoire
window.addEventListener("load",()=>{

document.getElementById("message").placeholder=

randomQuestions[Math.floor(Math.random()*randomQuestions.length)];

});



// compteur viral

const dbRef=ref(db);

get(child(dbRef,"messages")).then((snapshot)=>{

if(snapshot.exists()){

let count=Object.keys(snapshot.val()).length;

document.getElementById("viralCount").innerText=

"👇 "+count+" personnes ont déjà envoyé un message";

}

});



onAuthStateChanged(auth,user=>{

if(user){

console.log("Utilisateur connecté");

}

});

</script>
</body>

</html>
