<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Insolites Moments</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: 'Poppins', sans-serif;
    background: #0a0a0a;
    color: #fff;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    padding: 15px 30px;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-between;
    z-index: 1000;
}
nav h1 { color:red; font-family: Orbitron; }

/* HERO */
.hero {
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}
.hero h2 { color:red; font-size:3rem; }

/* SECTION */
.section {
    padding:80px 20px;
    text-align:center;
}
.section h3 { color:red; }

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card {
    background:#111;
    padding:10px;
    border-radius:10px;
}

/* VIDEO */
video {
    width:100%;
    border-radius:10px;
}

/* BTN */
button {
    padding:10px;
    border:none;
    background:red;
    color:white;
    border-radius:5px;
    cursor:pointer;
    margin-top:5px;
}

/* COMMENTS */
.comment-box input {
    width:100%;
    padding:5px;
}

.comment {
    font-size: 13px;
    margin-top: 5px;
    background: #222;
    padding: 5px;
    border-radius: 5px;
}

/* SWITCH */
.switch {
    position:fixed;
    top:20px;
    right:20px;
    cursor:pointer;
}
</style>

</head>

<body>

<nav>
<h1>INSOLITES</h1>
</nav>

<section class="hero">
<h2>Insolites Moments</h2>
</section>

<section class="section">
<h3>Vidéos</h3>
<div class="grid" id="grid"></div>
</section>

<button class="switch" onclick="toggleMode()">🌙</button>

<!-- FIREBASE + JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, onSnapshot, doc, updateDoc, increment, addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBdo7NO1PnAa90PhEhuzpllkB1ESGZu3J8",
  authDomain: "harry-undersand.firebaseapp.com",
  projectId: "harry-undersand",
  storageBucket: "harry-undersand.appspot.com",
  messagingSenderId: "1008823909561",
  appId: "1:1008823909561:web:9a8b4b46cab592972f6f68"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");

// 🔥 LOAD VIDEOS
onSnapshot(collection(db, "videos"), (snap) => {
  grid.innerHTML = "";

  snap.forEach(docSnap => {
    const data = docSnap.data();
    const id = docSnap.id;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <video src="${data.url}" controls></video>
      <button onclick="like('${id}')">❤️ ${data.likes || 0}</button>

      <div class="comment-box">
        <input placeholder="Commenter..." id="c-${id}">
        <button onclick="sendComment('${id}')">Envoyer</button>
        <div id="comments-${id}"></div>
      </div>
    `;

    grid.appendChild(card);

    loadComments(id);
  });
});

// ❤️ LIKE
window.like = async (id) => {
  await updateDoc(doc(db,"videos",id), {
    likes: increment(1)
  });
};

// 💬 AJOUT COMMENTAIRE (FIREBASE)
window.sendComment = async (id) => {
  const input = document.getElementById("c-"+id);
  if(!input.value) return;

  await addDoc(collection(db,"comments"), {
    videoId: id,
    text: input.value,
    date: Date.now()
  });

  input.value = "";
};

// 🔄 LOAD COMMENTS TEMPS RÉEL
function loadComments(videoId){
  onSnapshot(collection(db,"comments"), (snap)=>{
    const box = document.getElementById("comments-"+videoId);
    box.innerHTML = "";

    snap.forEach(doc=>{
      const c = doc.data();
      if(c.videoId === videoId){
        const div = document.createElement("div");
        div.className = "comment";
        div.textContent = "💬 " + c.text;
        box.appendChild(div);
      }
    });
  });
}

</script>

<script>
// 🌙 MODE SOMBRE
function toggleMode(){
  document.body.style.background =
    document.body.style.background === "white" ? "#0a0a0a" : "white";

  document.body.style.color =
    document.body.style.color === "black" ? "white" : "black";
}
</script>

</body>
</html>
